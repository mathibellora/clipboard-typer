name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: clipboard-typer-windows.exe
            ldflags: "-s -w -H windowsgui"
          - os: macos-latest
            name: clipboard-typer-mac
            ldflags: "-s -w"
          - os: ubuntu-latest
            name: clipboard-typer-linux
            ldflags: "-s -w"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc libx11-dev libxtst-dev \
            libgtk-3-dev libayatana-appindicator3-dev

      - name: Add MinGW to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="${{ matrix.ldflags }}" -o ${{ matrix.name }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Delete existing latest release
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Última versión
          body: |
            ## Descarga

            | Sistema | Archivo |
            |---------|---------|
            | Windows | `clipboard-typer-windows.exe` |
            | Mac     | `clipboard-typer-mac` |
            | Linux   | `clipboard-typer-linux` |

            ## Uso
            1. Descargá el archivo para tu sistema
            2. Ejecutalo (en Mac puede pedir permiso de Accesibilidad la primera vez)
            3. Aparece un ícono en la barra del sistema
            4. Copiá la contraseña, hacé click en el campo de la VM y presioná **Ctrl+Shift+V**
          files: dist/*
          make_latest: true
